<!DOCTYPE html>
<html>
<head>

<style>
  .el-range-separator {

	}

	}

	margin-top: 50px!important;

	.el-icon-arrow-down {

	}

	  width: 120px!important;
	}

}
.el-table td, .el-table th {
		      padding: 5px 0;
		 }
		 .demo-table-expand {
    font-size: 0;
  }

  }
  .demo-table-expand .el-form-item {

  }

margin-left: 3px;

 width:80px!important;

    width: 285px;
}

margin-right: 10px;
}
.widget-header {
	 min-height: 25px!important;
	 max-height: 25px!important;
	 padding-bottom: 4px;
}

  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  display: block;

<title></title>
</head>
<body style="height: 1902px; margin: 0">
	 <div id="app" style="overflow-y: hidden;overflow-x: hidden;margin: 0 10px 0 0px;" class="main-container"> 
	 
	   <!-- 左边--->
		 <div style="width:38%; float: left;height: 860px; margin-top: 0px;margin-left: 50px" >
			<div class="widget-box" style="margin-top: 10px;height: 380px;">
				<div class="widget-header header-color-blue2">
					<h4 class="lighter smaller">当前服务订阅统计</h4>
				</div>
				<div class="widget-body" style="height: 420px;overflow-x:auto;width:100%;">
					<div  style="margin-top: 15px;margin-left: 35px">
						 <el-table
						    :data="subscriptionList"
						    style="width: 100%"
						     height="402"
						      :default-sort = "{prop: 'date', order: 'descending'}"
						     v-loading="firstDateLoading">
						     <el-table-column
						      label="通知名称"
						      prop="pushName"
						       width="250px">
						        </el-table-column>
						      
						     <el-table-column
						      label="订阅人数"
						      prop="yCount"
						       width="100px">
						        </el-table-column> 
						       <el-table-column
						      label="退订人数"
						      prop="nCount"
						       width="100px">
						        </el-table-column>
						      <el-table-column
						      label="总计"
						      prop="tCount"
						       width="100px">
						        </el-table-column>       
						    </el-table-column>
							    <el-table-column  label="操作" fixed="right">
					                   <template slot-scope="scope">
										   <el-button size="small"  type="primary"  @click="historyInit(scope.row)">历史信息</el-button>
										 </template> 
					          </el-table-column> 
						  </el-table>
			
					</div>
				</div>
			</div>
		</div> 
		<!--  -->
		
		 <!-- 左边--->
		 <div style="width:27%; float: left;height: 860px; margin-top: 0px;margin-left: 50px" >
			<div class="widget-box" style="margin-top: 10px;height: 380px;">
				<div class="widget-header header-color-blue2">
					<h4 class="lighter smaller">用户行为统计</h4>
				</div>
				<div class="widget-body" style="height: 420px;overflow-x:auto;width:100%;">
					<div  style="margin-top: 15px;margin-left: 35px">
						 <el-table
						    :data="opList"
						    style="width: 100%"
						     height="402"
						      :default-sort = "{prop: 'date', order: 'descending'}"
						     v-loading="twoDateLoading">
						     <el-table-column
						      label="内容"
						      prop="name"
						       width="120px">
						        </el-table-column>
						      
						     <el-table-column
						      label="单人最高次数"
						      prop="maxCount"
						       width="100px">
						        </el-table-column> 
						       <el-table-column
						      label="总查看人数"
						      prop="personCount"
						       width="100px">
						        </el-table-column>
						      <el-table-column
						      label="总查看次数"
						      prop="sumCount"
						       width="100px">
						        </el-table-column>       
						    </el-table-column>
							  <!--   <el-table-column  label="操作" fixed="right">
					                   <template slot-scope="scope">
										   <el-button size="small"  type="primary"  @click="historyInit(scope.row)">历史信息</el-button>
										 </template> 
					          </el-table-column>  -->
						  </el-table>
			
					</div>
				</div>
			</div>
		</div> 
		<!--  -->
		
		
		<el-dialog
  :visible.sync="dialogVisible"
  width="52%"
  :before-close="handleClose">
  
  <span slot="footer" class="dialog-footer">
  <div class="block" style="margin-top: -45px; margin-right: 590px;">
							    <span style="font-size: 15px;">选择日期:</span> 
							    
							    <el-date-picker
							      v-model="value2"
							      type="daterange"
							      align="right"
							      unlink-panels
							      range-separator="至"
							      start-placeholder="开始日期"
							      end-placeholder="结束日期"
							      @change="changeStartEnd"
							      value-format="yyyyMMdd" format="yyyyMMdd" 
							      :picker-options="pickerOptions">
							    </el-date-picker>
		 </div>
     <div id="container" style="height: 560px;margin-top: 5px"></div>
  </span>
</el-dialog>
     
		
		
		
	 </div> 
	  
</body>
</html>
