<!DOCTYPE html>
<html lang="en">
<head>      
	<meta http-equiv="content-type" content="text/html; charset=UTF-8" />
	<title>产品管理系统</title>
	<script type="text/javascript" src="/static/views/js/commonCss.js"></script>
    <script type="text/javascript" src="/static/views/js/commonJs.js"></script> 
	<script src="/static/views/js/home/updPassword.js"></script> 
</head>
 
<body class="login-layout">
	<div class="main-container" id='passwordDiv'>
		<div class="main-content">
			<div class="row">
				<div class="col-sm-10 col-sm-offset-1">
					<div class="login-container">
						<div class="center">
							<h1>
								<i class="icon-leaf green"></i> <span class="red">客户服务系统</span> <span
									class="white">系统</span>
							</h1>
						</div>
						<div class="space-6"></div>
						<div class="position-relative">
							<div id="login-box"
								class="login-box visible widget-box no-border">
								<div class="widget-body">
									<div class="widget-main">
										<h4 class="header blue lighter bigger">
											<i class="icon-coffee green"></i> 请输入旧密码和新密码
										</h4>
										<!-- <font color=red>密码使用至少8位数字和字母组成</font> -->
										<font color=red>密码必须含有数字和字母且不少于8位</font>
										
										<div class="space-6"></div>
										<form id="loginForm" method="post" enctype="multipart/form-data" action="" >
											<fieldset>
												<label class="block clearfix"> <span
													class="block input-icon input-icon-right"> <input name="passwordNo" id="passwordNo"
														type="password" class="form-control" placeholder="旧密码" />
														<i class="icon-lock"></i>
												</span>
												</label>
												<label class="block clearfix"> <span
													class="block input-icon input-icon-right"> <input name="newPasswordNo" id="newpass1"
														type="password" class="form-control" placeholder="新密码" />
														<i class="icon-lock"></i>
												</span>
												</label>
												<label class="block clearfix"> <span
													class="block input-icon input-icon-right"> <input name="newPasswordNo" id="newpass2"
														type="password" class="form-control" placeholder="再次新密码" />
														<i class="icon-lock"></i>
												</span>
												</label>

												<div class="space"></div>

												<div class="clearfix"><!-- onclick="upass()"  --> 
													<button type="button" id="login-btn" @click="updPassword"
														class="width-35 pull-right btn btn-sm btn-primary">
														<i class="icon-key"></i> 确认修改
													</button>
													<!-- <button type="button" onclick="backHome()"
														class="width-35 pull-right btn btn-sm" style="margin-right:5px">
														<i class="icon-home"></i> 返回首页
													</button> -->
												</div>
											</fieldset>
										</form>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
<script type="text/javascript">
    //按回车键
    document.onkeydown = function(e){
    	var event = e || window.event;
    	var code = event.keyCode || event.which || event.charCode;
    	if (code == 13) {
    		upass();
    	}
    }
    /* //重置
    function cleardata(){
    	$('#loginForm').form('clear');
    }
	
  
    function backHome(){
    	location.href='home.do';
    } */
    
</script>

</html>
